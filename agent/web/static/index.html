<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForgeX 驾驶舱</title>
<style>
/* ── 主题变量 ── */
:root[data-theme="dark"] {
  --bg: #080c18;
  --bg2: #0d1225;
  --surface: #111827;
  --surface2: #1a2332;
  --surface3: #1f2b3d;
  --border: #1e2d45;
  --border2: #2a3a55;
  --accent: #00d4ff;
  --accent2: #0ea5e9;
  --accent3: #7c3aed;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --shadow: rgba(0,212,255,0.1);
}
:root[data-theme="light"] {
  --bg: #f0f4f8;
  --bg2: #e8edf3;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --surface3: #e2e8f0;
  --border: #cbd5e1;
  --border2: #94a3b8;
  --accent: #0066cc;
  --accent2: #0ea5e9;
  --accent3: #7c3aed;
  --text: #1a1a2e;
  --text2: #475569;
  --text3: #94a3b8;
  --green: #16a34a;
  --yellow: #ca8a04;
  --red: #dc2626;
  --orange: #ea580c;
  --purple: #9333ea;
  --shadow: rgba(0,102,204,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh; overflow: hidden;
  font-size: 13px;
  position: relative;
}

/* ── 科技感背景 ── */
.bg-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-grid {
  position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridRotate 60s linear infinite;
}
[data-theme="light"] .bg-grid {
  background-image:
    linear-gradient(rgba(0,102,204,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,102,204,0.04) 1px, transparent 1px);
}
@keyframes gridRotate { 0%{transform:rotate(0deg) translate(0,0)} 100%{transform:rotate(360deg) translate(0,0)} }

.bg-glow {
  position: absolute; width: 600px; height: 600px;
  border-radius: 50%; filter: blur(120px);
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  top: -200px; right: -200px;
  animation: glowPulse 8s ease-in-out infinite alternate;
}
[data-theme="light"] .bg-glow {
  background: radial-gradient(circle, rgba(0,102,204,0.06) 0%, transparent 70%);
}
@keyframes glowPulse { 0%{opacity:0.5;transform:scale(1)} 100%{opacity:1;transform:scale(1.2)} }

.bg-glow2 {
  position: absolute; width: 400px; height: 400px;
  border-radius: 50%; filter: blur(100px);
  background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  animation: glowPulse2 12s ease-in-out infinite alternate;
}
@keyframes glowPulse2 { 0%{opacity:0.3;transform:translate(0,0)} 100%{opacity:0.7;transform:translate(50px,-50px)} }

/* ── 粒子 ── */
.particles { position: absolute; width: 100%; height: 100%; }
.particle {
  position: absolute; width: 2px; height: 2px;
  background: var(--accent); border-radius: 50%;
  opacity: 0.3; animation: float linear infinite;
}
@keyframes float {
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:0.4}
  90%{opacity:0.4}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ── 扫描线 ── */
.scanline {
  position: absolute; width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.08), transparent);
  animation: scanMove 4s linear infinite;
}
@keyframes scanMove { 0%{top:0} 100%{top:100%} }

/* ── 顶部栏 ── */
.topbar {
  position: relative; z-index: 10;
  height: 44px; display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.topbar .logo { font-weight: 700; font-size: 15px; color: var(--accent); letter-spacing: 2px; }
.topbar .logo span { color: var(--text); }
.topbar .sep { width: 1px; height: 18px; background: var(--border); }
.topbar .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 3px;
  background: var(--surface2); color: var(--text2);
  border: 1px solid var(--border);
}
.topbar .badge.on { background: rgba(34,197,94,0.1); color: var(--green); border-color: rgba(34,197,94,0.2); }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); margin-left: auto;
  transition: background 0.3s;
}
.dot.busy { background: var(--yellow); animation: dotPulse 1s infinite; }
@keyframes dotPulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--yellow)} 50%{opacity:0.4} }

.topbar .theme-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  cursor: pointer; font-size: 14px; padding: 2px 8px; border-radius: 4px;
  line-height: 1; transition: all 0.2s;
}
.topbar .theme-btn:hover { background: var(--surface2); color: var(--text); }
.topbar .clear-btn {
  background: none; border: 1px solid var(--border); color: var(--text3);
  cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 4px;
  transition: all 0.2s;
}
.topbar .clear-btn:hover { border-color: var(--red); color: var(--red); }

/* ── 布局 ── */
.app { display: flex; height: calc(100vh - 44px - 28px); position: relative; z-index: 1; }

/* ── 左侧面板 ── */
.left-panel {
  width: 200px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 10px;
}
.left-panel .sec { margin-bottom: 14px; }
.left-panel .sec-title {
  font-size: 9px; letter-spacing: 1.5px;
  color: var(--text3); margin-bottom: 6px; font-weight: 600;
}
.tree-item {
  padding: 2px 6px; cursor: pointer; border-radius: 3px;
  font-size: 12px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: background 0.15s;
  user-select: none;
}
.tree-item:hover { background: var(--surface3); }
.tree-item .ic { margin-right: 4px; flex-shrink: 0; }
.tree-item .ic.folder { color: var(--yellow); }
.tree-item .ic.py { color: var(--accent); }
.tree-children { padding-left: 14px; }
.tree-arrow {
  display: inline-block; width: 12px; text-align: center;
  transition: transform 0.15s; flex-shrink: 0; font-size: 10px;
  color: var(--text3);
}
.tree-arrow.expanded { transform: rotate(90deg); }
.tree-name { overflow: hidden; text-overflow: ellipsis; }
.tree-item-inner {
  display: flex; align-items: center; gap: 2px; padding: 1px 0;
}
.tree-count {
  font-size: 10px; color: var(--text3); margin-left: 4px;
}

/* ── 工作空间 ── */
.ws-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-size: 11px;
  padding: 1px 6px; border-radius: 3px; line-height: 1.4;
  transition: all 0.15s;
}
.ws-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
.ws-path {
  font-family: 'SF Mono','Fira Code',monospace; font-size: 11px;
  color: var(--accent); padding: 3px 8px; margin-bottom: 4px;
  background: rgba(0,212,255,0.04); border-radius: 4px;
  border: 1px solid rgba(0,212,255,0.1); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.ws-tree {
  max-height: 160px; overflow-y: auto; font-size: 12px;
  padding: 2px 4px; border-radius: 4px;
}
.ws-tree .tree-item { padding: 1px 4px; }
.ws-tree::-webkit-scrollbar { width: 3px; }

/* ── 工具组标题（可折叠） ── */
.group-header {
  display: flex; align-items: center; gap: 6px; padding: 4px 6px;
  cursor: pointer; user-select: none; border-radius: 4px;
  font-size: 9px; letter-spacing: 1.5px; color: var(--text3); font-weight: 600;
  transition: background 0.15s;
}
.group-header:hover { background: var(--surface3); }
.group-header .arrow { font-size: 9px; transition: transform 0.15s; flex-shrink: 0; }
.group-header .arrow.open { transform: rotate(90deg); }
.group-header .badge { font-size: 9px; margin-left: auto; color: var(--text3); font-weight: 400; }

/* ── 工具网格 ── */
.tool-grid {
  display: flex; flex-wrap: wrap; gap: 2px; padding: 4px 6px;
}
.tool-grid .tg-item {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 6px; font-size: 10px; border-radius: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); cursor: default; transition: all 0.15s;
}
.tool-grid .tg-item:hover { background: var(--surface3); color: var(--text); }
.tool-grid .tg-item .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.tool-grid .tg-item .dot.ok { background: var(--green); }
.tool-grid .tg-item .dot.disabled { background: var(--text3); }

/* ── 主机工具链网格 ── */
.tool-grid .tg-item.env-ok { border-color: rgba(34,197,94,0.2); }
.tool-grid .tg-item.env-miss { opacity: 0.45; }
.tool-grid .tg-item .tg-ver { font-size: 9px; color: var(--text3); }

.tool-item {
  padding: 2px 6px; font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}
.tool-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.cfg-row { padding: 2px 0; font-size: 11px; display: flex; justify-content: space-between; }
.cfg-row .v { color: var(--text); }

/* ── 中间面板 ── */
.center-panel {
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  background: rgba(0,0,0,0.2);
}
[data-theme="light"] .center-panel { background: rgba(255,255,255,0.5); }
.msgs {
  flex: 1; overflow-y: auto; padding: 14px 18px;
}
.msg { margin-bottom: 10px; }
.msg.user { text-align: right; }
.msg .bubble {
  display: inline-block; padding: 8px 13px; border-radius: 8px;
  font-size: 13px; line-height: 1.55; max-width: 80%;
  text-align: left; white-space: pre-wrap; word-break: break-word;
}
.msg.user .bubble {
  background: var(--accent); color: #fff;
  border-radius: 8px 8px 2px 8px;
}
.msg.agent .bubble {
  background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px 8px 8px 2px;
}
.msg .meta { font-size: 10px; color: var(--text3); margin-top: 2px; padding: 0 4px; }
.cur-bubble { background: var(--surface2); border: 1px solid var(--border); }
.cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 1px; animation: blink 0.8s infinite; vertical-align: text-bottom; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── 工具徽章 ── */
.tool-badge {
  display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
  margin: 1px 2px 0 0; font-family: monospace;
}
.tool-badge.ok { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.tool-badge.err { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.tool-badge.run { background: rgba(234,179,8,0.1); color: var(--yellow); border: 1px solid rgba(234,179,8,0.2); animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── 方案卡片 ── */
.plan-card {
  background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px;
  padding: 10px 12px; margin: 8px 0; font-size: 12px;
  box-shadow: 0 0 20px var(--shadow);
}
.plan-card .ptitle { color: var(--accent); font-weight: 600; margin-bottom: 6px; font-size: 13px; }
.plan-card .pstep { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.plan-card .pstep .icn { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
.plan-card .pstep .icn.wait { border: 2px solid var(--text3); color: var(--text3); }
.plan-card .pstep .icn.run { border: 2px solid var(--yellow); animation: spin 0.8s linear infinite; }
.plan-card .pstep .icn.done { background: var(--green); border: 2px solid var(--green); color: #fff; }
.plan-card .pstep .icn.fail { background: var(--red); border: 2px solid var(--red); color: #fff; }
@keyframes spin { to { transform: rotate(360deg); } }
.plan-card .pbar { margin-top: 6px; height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.plan-card .pbar .pf { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width 0.5s; }

/* ── Diff 视图 ── */
.diff-view { font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; line-height: 1.5; margin: 4px 0; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.diff-ln { padding: 0 8px; display: flex; gap: 6px; white-space: pre; }
.diff-ln .diff-num { color: var(--text3); width: 24px; text-align: right; flex-shrink: 0; user-select: none; }
.diff-ln .diff-op { width: 14px; flex-shrink: 0; font-weight: 700; }
.diff-rm { background: rgba(239,68,68,0.08); }
.diff-rm .diff-op { color: var(--red); }
.diff-add { background: rgba(34,197,94,0.08); }
.diff-add .diff-op { color: var(--green); }
.diff-eq { background: transparent; color: var(--text2); }

/* ── 输入区 ── */
.input-area {
  padding: 8px 14px; border-top: 1px solid var(--border);
  background: var(--surface); display: flex; gap: 8px; align-items: flex-end;
}
.input-area textarea {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; color: var(--text);
  font-size: 13px; font-family: inherit; resize: none; outline: none;
  min-height: 36px; max-height: 100px; line-height: 1.4;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  height: 36px; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 600; cursor: pointer; padding: 0 14px;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.input-area .btn-send { background: var(--accent); color: #fff; }
.input-area .btn-send:hover { opacity: 0.85; }
.input-area .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
.input-area .btn-stop { background: var(--red); color: #fff; }
.input-area .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }
.input-area .hint { font-size: 10px; color: var(--text3); white-space: nowrap; }

/* ── 右侧面板 ── */
.right-panel {
  width: 260px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 10px;
}
.right-panel .sec { margin-bottom: 14px; }
.right-panel .sec-title {
  font-size: 9px; letter-spacing: 1.5px;
  color: var(--text3); margin-bottom: 6px; font-weight: 600;
}
.gauge { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.gauge .lb { font-size: 11px; color: var(--text2); width: 55px; flex-shrink: 0; }
.gauge .bar { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.gauge .bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.gauge .vl { font-size: 11px; color: var(--text); width: 35px; text-align: right; }
.stat-r { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.stat-r:last-child { border-bottom: none; }
.stat-r .lb { color: var(--text3); }
.stat-r .vl { color: var(--text); }
.p-badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.p-badge.ic { background: rgba(99,102,241,0.1); color: #818cf8; }
.p-badge.an { background: rgba(234,179,8,0.1); color: var(--yellow); }
.p-badge.pl { background: rgba(249,115,22,0.1); color: var(--orange); }
.p-badge.ex { background: rgba(34,197,94,0.1); color: var(--green); }
.p-badge.ve { background: rgba(168,85,247,0.1); color: var(--purple); }
.p-badge.do { background: rgba(34,197,94,0.1); color: var(--green); }
.d-item { font-size: 11px; padding: 2px 0; color: var(--text2); }
.d-item .ts { color: var(--text3); font-size: 10px; margin-right: 4px; }
.log-item { font-size: 11px; padding: 1px 0; font-family: monospace; }
.log-item.i { color: var(--text2); }
.log-item.w { color: var(--yellow); }
.log-item.e { color: var(--red); }

/* ── 状态栏 ── */
.statusbar {
  position: relative; z-index: 10;
  height: 28px; display: flex; align-items: center;
  padding: 0 14px; gap: 16px;
  background: var(--surface); border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3);
}
.statusbar .s-item { display: flex; align-items: center; gap: 4px; }
.statusbar .s-dot { width: 6px; height: 6px; border-radius: 50%; }
.statusbar .s-dot.green { background: var(--green); }
.statusbar .s-dot.yellow { background: var(--yellow); }
.statusbar .s-val { color: var(--text2); }

/* ── 滚动条 ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── 响应式 ── */
@media (max-width: 900px) {
  .left-panel { display: none; }
  .right-panel { width: 200px; }
}
@media (max-width: 640px) {
  .right-panel { display: none; }
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
  <div class="scanline"></div>
  <div class="particles" id="particles"></div>
</div>

<!-- 顶部栏 -->
<div class="topbar">
  <span class="logo">⚡ Forge<span>X</span></span>
  <span class="sep"></span>
  <span class="badge on">v0.4.0</span>
  <span class="badge on" id="cogBadge">认知: ON</span>
  <span class="badge on" id="execBadge">执行: ON</span>
  <span class="badge" id="phaseBadge">—</span>
  <div class="dot" id="statusDot"></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
  <button class="clear-btn" onclick="clearChat()">清空</button>
</div>

<!-- 主布局 -->
<div class="app">

<!-- ═══ 左侧 ═══ -->
<div class="left-panel">
  <!-- 📂 工作空间 -->
  <div class="sec" style="padding:0 0 6px 0;">
    <div style="display:flex;align-items:center;gap:4px;padding:0 6px 4px;">
      <span style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px;flex:1;">📂 工作空间</span>
      <button class="ws-btn" onclick="importWorkspace()" title="导入已有目录">📂</button>
      <button class="ws-btn" onclick="createWorkspace()" title="新建项目">➕</button>
    </div>
    <div class="ws-path" id="wsPath">D:/ForgeX/</div>
    <div class="ws-tree" id="wsTree">
      <div style="font-size:11px;color:var(--text3);padding:2px 6px;">扫描中...</div>
    </div>
  </div>
  <!-- 📦 内置工具 — 默认展开 -->
  <div class="group-header" onclick="toggleGroup('builtinGroup')" style="padding:6px;margin-bottom:2px;">
    <span class="arrow open">▶</span>📦 内置工具 <span class="badge" id="toolsCount">—</span>
  </div>
  <div id="builtinGroup" class="tool-grid" style="">
    <div style="font-size:11px;color:var(--text3);padding:2px 4px;">加载中...</div>
  </div>

  <!-- 🔧 主机工具链 — 默认展开 -->
  <div class="group-header" onclick="toggleGroup('hostToolGroup')" style="padding:6px;margin-top:6px;margin-bottom:2px;">
    <span class="arrow open">▶</span>🔧 主机工具链 <span class="badge" id="hostToolsCount">—</span>
  </div>
  <div id="hostToolGroup" class="tool-grid" style="">
    <div style="font-size:11px;color:var(--text3);padding:2px 4px;">探测中...</div>
  </div>

  <!-- 📋 任务 — 默认折叠 -->
  <div class="group-header" onclick="toggleGroup('taskGroup')" style="padding:6px;margin-top:6px;margin-bottom:2px;">
    <span class="arrow">▶</span>📋 任务 <span class="badge" id="taskCount">0</span>

  <div id="taskGroup" class="tool-grid" style="display:none;">

      <input type="range" id="cfgTemp" min="0" max="2" step="0.1" value="0.0" style="width:100%;accent-color:var(--accent);cursor:pointer;">

      <span style="font-size:10px;color:var(--text3);">Max Tokens</span>
      <input type="number" id="cfgMaxTokens" value="8192" min="512" max="65536" step="512" style="width:70px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:1px 4px;font-size:11px;text-align:right;">

<!-- ═══ 中间 ═══ -->
<div class="center-panel">
  <div class="msgs" id="msgs">
    <div class="msg agent">
      <div class="bubble">ForgeX v0.4.0 驾驶舱已就绪。<br>输入消息开始使用。</div>
    </div>
  </div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>

    <button class="btn-stop" id="stopBtn" onclick="stopStream()" disabled>停止</button>
    <span class="hint" id="inputHint">就绪</span>

</div>

<!-- ═══ 右侧 ═══ -->
<div class="right-panel">
  <div class="sec">
    <div class="sec-title">🧠 认知</div>
    <div class="gauge">
      <span class="lb">意图</span>
      <span style="font-size:13px; color:var(--accent); font-weight:600;" id="rIntent">—</span>
    </div>
    <div class="gauge">
      <span class="lb">置信度</span>
      <div class="bar"><div class="fill" id="rConfBar" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--accent3));"></div></div>
      <span class="vl" id="rConfVal">0%</span>
    </div>
    <div class="phase-track" id="phaseTrack" style="margin:4px 0 6px;display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;"></div>
    <div class="stat-r"><span class="lb">阶段</span><span class="vl" id="rPhase">—</span></div>
    <div class="stat-r"><span class="lb">轮次</span><span class="vl" id="rTurn">0</span></div>
    <div class="stat-r"><span class="lb">决策</span><span class="vl" id="rDecisions">0</span></div>
    <div class="stat-r"><span class="lb">工具调用</span><span class="vl" id="rToolCalls">0</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">🎯 任务</div>
    <div class="stat-r"><span class="lb">目标</span><span class="vl" id="rGoal" style="font-size:11px;max-width:150px;overflow:hidden;text-overflow:ellipsis;">—</span></div>
    <div class="stat-r"><span class="lb">修改文件</span><span class="vl" id="rFiles">0</span></div>
    <div class="stat-r"><span class="lb">项目类型</span><span class="vl" id="rProject">—</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">📋 最近决策</div>
    <div id="rDecList"><span style="font-size:11px;color:var(--text3);">(无)</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">📝 日志</div>
    <div id="logList" style="max-height:150px;overflow-y:auto;">
      <div class="log-item i">就绪</div>
    </div>
  </div>

</div>

<!-- 状态栏 -->
<div class="statusbar">
  <div class="s-item" id="sConn"><span class="s-dot green"></span>已连接</div>
  <div class="s-item">阶段: <span class="s-val" id="sPhase">—</span></div>
  <div class="s-item">进度: <span class="s-val" id="sProgress">—</span></div>
  <div class="s-item">Token: <span class="s-val" id="sTokens">0</span></div>
  <div class="s-item" style="margin-left:auto;">耗时: <span class="s-val" id="sDuration">—</span></div>
</div>

<script>
// ── 状态 ──
let curText = '';
let streaming = false;
let isSending = false;
let msgId = 0;
let totalTokens = 0;
let startTime = 0;
let curPlanSteps = [];
let streamingTimer = null;  // safety timeout
const _messages = [];       // 消息统一队列 [{role, text, ts}]

// ── DOM ──
const msgs = document.getElementById('msgs');
const inp = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDot = document.getElementById('statusDot');
const inputHint = document.getElementById('inputHint');

// ── 主题 ──
function getTheme() { return localStorage.getItem('forgex-theme') || 'dark'; }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('forgex-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); }
setTheme(getTheme());

// ── 粒子 ──
(function initParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 20 + 's';
    p.style.animationDuration = (15 + Math.random() * 20) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    c.appendChild(p);
  }
})();

// ── SSE ──
let evtSrc = null;
let sseReconnectTimer = null;
function connectSSE() {
  if (evtSrc) {
    evtSrc.onerror = null;  // prevent reconnect loop on close
    evtSrc.close();
    evtSrc = null;
  }
  if (sseReconnectTimer) { clearTimeout(sseReconnectTimer); sseReconnectTimer = null; }
  evtSrc = new EventSource('/api/stream');

  evtSrc.onopen = function() {
    var sConn = document.getElementById('sConn');
    if (sConn) sConn.innerHTML = '<span class="s-dot green"></span>已连接';
    log('i', 'SSE 连接建立');
  };

  evtSrc.addEventListener('token', e => {
    const d = JSON.parse(e.data); appendToken(d.text);
  });
  evtSrc.addEventListener('user_message', e => {
    // 前端已在 send() 中乐观添加，此处忽略避免重复
  });
  evtSrc.addEventListener('tool_start', e => {
    const d = JSON.parse(e.data); addToolBadge(d.name, 'run');
    statusDot.className = 'dot busy'; log('i', '工具: ' + d.name);
  });
  evtSrc.addEventListener('tool_result', e => {
    const d = JSON.parse(e.data);
    addToolBadge(d.name, d.success ? 'ok' : 'err');
    statusDot.className = 'dot';
    log(d.success ? 'i' : 'w', (d.success ? '✓' : '✗') + ' ' + d.name + ' (' + d.duration_ms.toFixed(0) + 'ms)');
  });
  evtSrc.addEventListener('status_update', e => { updateDash(JSON.parse(e.data)); });

  // ── 工作流事件 ──
  evtSrc.addEventListener('thought', function(e) {
    var d = JSON.parse(e.data);
    addThought(d.text);
  });
  evtSrc.addEventListener('plan', function(e) {
    var d = JSON.parse(e.data);
    var steps = d.steps || [];
    addPlanCard(steps);
  });
  evtSrc.addEventListener('step_start', function(e) {
    var d = JSON.parse(e.data);
    addStepStatus(d.step, d.description, 'running');
  });
  evtSrc.addEventListener('step_diff', function(e) {
    var d = JSON.parse(e.data);
    addDiffView(d.file, d.before || '', d.after || '', d.action || 'edit');
  });
  evtSrc.addEventListener('step_done', function(e) {
    var d = JSON.parse(e.data);
    addStepStatus(d.step, d.description || d.result || '', 'done');
  });
  evtSrc.addEventListener('progress', function(e) {
    var d = JSON.parse(e.data);
    updateProgress(d.current, d.total);
  });
  evtSrc.addEventListener('done', function(e) {
    if (streamingTimer) clearTimeout(streamingTimer);
    const d = JSON.parse(e.data); finishMsg(d.text);
    statusDot.className = 'dot'; streaming = false; isSending = false;
    sendBtn.disabled = false; stopBtn.disabled = true; inp.disabled = false;
    inputHint.textContent = '就绪'; inp.focus();
  });
  // 注意：SSE 'error' 事件用 onerror 处理（line 625），不用 addEventListener
  // 因为 addEventListener('error') 中的 e.data 在连接断开时为空，JSON.parse 会抛异常
  evtSrc.onerror = () => {
    evtSrc.close();
    evtSrc = null;
    var sConn = document.getElementById('sConn');
    if (sConn) sConn.innerHTML = '<span class="s-dot yellow"></span>重连中';
    log('w', 'SSE 连接断开，2s 后重连');
    // 如果正在发送，重置状态
    if (streaming || isSending) {
      streaming = false; isSending = false;
      sendBtn.disabled = false; stopBtn.disabled = true; inp.disabled = false;
      statusDot.className = 'dot'; inputHint.textContent = '连接断开';
      finishMsg('[连接断开]');
    }
    sseReconnectTimer = setTimeout(connectSSE, 2000);
  };
}

// ── 发送 ──
function send() {
  const text = inp.value.trim();
  if (!text || streaming || isSending) return;
  isSending = true;
  inp.value = ''; inp.style.height = 'auto';
  inp.disabled = true; sendBtn.disabled = true; stopBtn.disabled = false;
  streaming = true; statusDot.className = 'dot busy';
  startTime = Date.now();
  curText = ''; curPlanSteps = [];
  inputHint.textContent = '执行中...';
  addMsg('user', text);
  // Safety timeout: auto-unlock after 120s if SSE never completes
  if (streamingTimer) clearTimeout(streamingTimer);
  streamingTimer = setTimeout(function() {
    if (streaming) {
      streaming = false; isSending = false;
      sendBtn.disabled = false; stopBtn.disabled = true; inp.disabled = false;
      statusDot.className = 'dot';
      inputHint.textContent = '超时';
      finishMsg('[超时] 服务器未响应');
    }
  }, 120000);
  fetch('/api/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text}) })
  .catch(function() { finishMsg('[网络错误] 无法连接到服务器'); streaming=false; isSending=false; sendBtn.disabled=false; stopBtn.disabled=true; inp.disabled=false; });
}

async function stopStream() {
  // v0.5: 调用后端停止
  streaming = false; isSending = false; sendBtn.disabled = false; stopBtn.disabled = true;
  inp.disabled = false; statusDot.className = 'dot';
  finishMsg('[已中断]'); inputHint.textContent = '已中断';
  try {
    await fetch('/api/stop', { method:'POST' });
  } catch(_) {}
}

// ── 消息 (统一队列 + 时间戳排序) ──
function renderAll() {
  // 清空容器，按时间戳升序重建
  msgs.innerHTML = '';
  const sorted = _messages.slice().sort(function(a, b) { return a.ts - b.ts; });
  for (var i = 0; i < sorted.length; i++) {
    var m = sorted[i];
    var d = document.createElement('div'); d.className = 'msg ' + m.role;
    var ts = new Date(m.ts).toLocaleTimeString();
    d.innerHTML = '<div class="bubble">' + escHtml(m.text) + '</div><div class="meta">' + ts + '</div>';
    msgs.appendChild(d);
  }
  scrollBtm();
}

function addMsg(role, text) {
  var now = Date.now();
  _messages.push({role: role, text: text, ts: now});
  var d = document.createElement('div'); d.className = 'msg ' + role;
  var ts = new Date(now).toLocaleTimeString();
  d.innerHTML = '<div class="bubble">' + escHtml(text) + '</div><div class="meta">' + ts + '</div>';
  msgs.appendChild(d); scrollBtm();
  if (role === 'user') { saveLocal(); }
}

function curMsg() {
  var el = document.getElementById('curMsg');
  if (!el) {
    // 当前正在回复的消息：先存入队列再渲染
    var now = Date.now();
    _messages.push({role: 'agent', text: '', ts: now, _streaming: true});
    renderAll();
    // 重建后重新获取 cursor 元素
    ensureCursor();
    el = document.getElementById('curMsg');
  }
  return document.getElementById('curText');
}

function ensureCursor() {
  var e = document.getElementById('curMsg');
  if (e) return;
  // 在渲染的消息中找到最后一条 agent 消息，设为流式容器
  var ms = msgs.querySelectorAll('.msg.agent');
  if (ms.length > 0) {
    var last = ms[ms.length - 1];
    last.id = 'curMsg';
    var bubble = last.querySelector('.bubble');
    if (bubble) {
      bubble.id = 'curBubble';
      var txt = bubble.querySelector('span');
      if (!txt) {
        var s = document.createElement('span'); s.id = 'curText'; s.textContent = '';
        bubble.insertBefore(s, bubble.firstChild);
      }
      var cursor = document.createElement('span'); cursor.className = 'cursor';
      bubble.appendChild(cursor);
    }
  }
}

function appendToken(text) {
  var el = curMsg();
  if (!el) return;
  curText += text; el.textContent = curText;
  // 更新队列中的消息内容
  for (var i = _messages.length - 1; i >= 0; i--) {
    if (_messages[i]._streaming) { _messages[i].text = curText; break; }
  }
  scrollBtm();
}

function finishMsg(text) {
  if (streamingTimer) clearTimeout(streamingTimer);
  var el = document.getElementById('curText');
  if (el) {
    var displayText = text || curText;
    el.textContent = displayText;
    var cursor = el.parentElement ? el.parentElement.querySelector('.cursor') : null;
    if (cursor) cursor.remove();
  }
  var c = document.getElementById('curMsg');
  if (c) {
    c.removeAttribute('id');
    var bubble = c.querySelector('#curBubble');
    if (bubble) bubble.removeAttribute('id');
    // 更新队列：标记流式结束
    for (var i = _messages.length - 1; i >= 0; i--) {
      if (_messages[i]._streaming) {
        _messages[i].text = text || curText;
        _messages[i]._streaming = false;
        break;
      }
    }
    saveLocal();
  }
}

function addToolBadge(name, status) {
  var b = document.getElementById('curBubble');
  if (!b) return;
  var cls = status === 'ok' ? 'tool-badge ok' : status === 'err' ? 'tool-badge err' : 'tool-badge run';
  var label = status === 'run' ? '>' : status === 'ok' ? 'OK' : 'ERR';
  var span = document.createElement('span'); span.className = cls; span.textContent = label + ' ' + name;
  b.appendChild(span);
}

// ── 工作流渲染器 ──

function addThought(text) {
  var el = document.getElementById('curThought');
  if (!el) {
    var d = document.createElement('div'); d.className = 'msg agent'; d.id = 'curThought';
    d.innerHTML = '<div class="bubble" style="color:var(--text2);font-style:italic;"><span id="thoughtText"></span></div>';
    msgs.appendChild(d);
    el = document.getElementById('thoughtText');
  }
  el.textContent = text;
  scrollBtm();
}

function addPlanCard(steps) {
  // 移除旧的计划卡片
  var old = document.getElementById('planCard');
  if (old) old.remove();
  var d = document.createElement('div'); d.className = 'plan-card'; d.id = 'planCard';
  var html = '<div class="ptitle">📋 执行计划 (' + steps.length + ' 步)</div>';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    html += '<div class="pstep" data-step="' + s.id + '">'
      + '<span class="icn wait">' + (i+1) + '</span>'
      + '<span>' + (s.description || '步骤 ' + (i+1)) + '</span>'
      + '</div>';
  }
  html += '<div class="pbar" style="display:none"><div class="pf" style="width:0%"></div></div>';
  d.innerHTML = html;
  msgs.appendChild(d); scrollBtm();
}

function addStepStatus(stepId, desc, status) {
  var card = document.getElementById('planCard');
  if (!card) return;
  var el = card.querySelector('[data-step="' + stepId + '"]');
  if (!el) return;
  var icn = el.querySelector('.icn');
  if (!icn) return;
  icn.className = 'icn ' + (status === 'done' ? 'done' : status === 'running' ? 'run' : 'wait');
  icn.textContent = status === 'done' ? 'OK' : status === 'running' ? '' : stepId;
  // 进度条
  var pbar = card.querySelector('.pbar');
  if (pbar) {
    pbar.style.display = 'block';
    var done = card.querySelectorAll('.icn.done').length;
    var total = card.querySelectorAll('.pstep').length;
    var pct = Math.round((done / total) * 100);
    pbar.querySelector('.pf').style.width = pct + '%';
  }
}

function addDiffView(file, before, after, action) {
  var d = document.createElement('div'); d.className = 'msg agent';
  var linesBefore = (before || '').split('\n').length;
  var linesAfter = (after || '').split('\n').length;
  var added = Math.max(0, linesAfter - linesBefore);
  var removed = Math.max(0, linesBefore - linesAfter);

  var diffHtml = '';
  if (before && after) {
    var bLines = before.split('\n');
    var aLines = after.split('\n');
    var maxLen = Math.max(bLines.length, aLines.length);
    diffHtml = '<div class="diff-view">';
    for (var i = 0; i < maxLen; i++) {
      var bLine = i < bLines.length ? bLines[i] : '';
      var aLine = i < aLines.length ? aLines[i] : '';
      if (bLine !== aLine) {
        if (i < bLines.length) diffHtml += '<div class="diff-ln diff-rm"><span class="diff-num">' + (i+1) + '</span><span class="diff-op">-</span>' + escHtml(bLine) + '</div>';
        if (i < aLines.length) diffHtml += '<div class="diff-ln diff-add"><span class="diff-num">' + (i+1) + '</span><span class="diff-op">+</span>' + escHtml(aLine) + '</div>';
      } else {
        diffHtml += '<div class="diff-ln diff-eq"><span class="diff-num">' + (i+1) + '</span><span class="diff-op"> </span>' + escHtml(bLine) + '</div>';
      }
    }
    diffHtml += '</div>';
  }

  d.innerHTML = '<div class="bubble">'
    + '<div style="color:var(--accent);font-weight:600;margin-bottom:4px;">📝 ' + escHtml(file) + '</div>'
    + '<div style="font-size:11px;color:var(--text3);margin-bottom:4px;">'
    + (added > 0 ? '<span style="color:var(--green);margin-right:8px;">+' + added + ' 行</span>' : '')
    + (removed > 0 ? '<span style="color:var(--red);">-' + removed + ' 行</span>' : '')
    + '</div>'
    + diffHtml
    + '</div>';
  msgs.appendChild(d); scrollBtm();
}

function updateProgress(current, total) {
  var pct = Math.round((current / total) * 100);
  setT('sProgress', pct + '%');
  var bar = document.getElementById('progressFill');
  if (bar) bar.style.width = pct + '%';
}

function saveLocal() {
  try {
    var arr = [];
    for (var i = 0; i < _messages.length; i++) {
      if (!_messages[i]._streaming) {
        arr.push({role: _messages[i].role, text: _messages[i].text, ts: _messages[i].ts});
      }
    }
    if (arr.length > 200) arr = arr.slice(-200);
    localStorage.setItem('forgex-chat', JSON.stringify(arr));
  } catch(_) {}
}

function loadChat() {
  try {
    var h = JSON.parse(localStorage.getItem('forgex-chat') || '[]');
    if (h.length === 0) return;
    for (var i = 0; i < h.length; i++) {
      _messages.push({role: h[i].role, text: h[i].text, ts: h[i].ts || Date.now()});
    }
    renderAll();
  } catch(_) {}
}

function clearChat() {
  if (!confirm('确定清空所有对话？')) return;
  _messages.length = 0;
  localStorage.removeItem('forgex-chat');
  var el = document.getElementById('curMsg'); if (el) el.remove();
  curText = '';
  msgs.innerHTML = '<div class="msg agent"><div class="bubble">对话已清空。</div></div>';
}

// ── 阶段配置 ──
const PHASES = ['intent_clarify', 'analysis', 'planning', 'executing', 'verifying', 'done'];
const PHASE_COLORS = { intent_clarify:'#818cf8', analysis:'#eab308', planning:'#f97316', executing:'#22c55e', verifying:'#a855f7', done:'#22c55e' };

// ── 仪表板 ──
function updateDash(d) {
  setT('rIntent', d.intent || '—');
  var confPct = d.intent_conf ? Math.round(d.intent_conf * 100) : 0;
  setT('rConfVal', confPct + '%');
  document.getElementById('rConfBar').style.width = confPct + '%';

  // 阶段徽章
  var pe = document.getElementById('rPhase');
  if (d.phase) {
    var cls = d.phase === 'intent_clarify' ? 'ic' : d.phase === 'analysis' ? 'an' : d.phase === 'planning' ? 'pl' : d.phase === 'executing' ? 'ex' : d.phase === 'verifying' ? 've' : d.phase === 'done' ? 'do' : '';
    pe.innerHTML = '<span class="p-badge ' + cls + '">' + phaseCN(d.phase) + '</span>';
    // 阶段轨
    var pt = document.getElementById('phaseTrack');
    if (pt) {
      var currentIdx = PHASES.indexOf(d.phase);
      pt.innerHTML = PHASES.map(function(p, i) {
        var color = i <= currentIdx ? PHASE_COLORS[p] : 'var(--surface3)';
        return '<div style="flex:1;background:' + color + ';border-radius:2px;transition:background 0.3s;"></div>';
      }).join('');
    }
  } else { pe.textContent = '—'; }

  setT('rTurn', String(d.turn_count ?? 0));
  setT('rDecisions', String(d.decisions ?? 0));
  setT('rToolCalls', String(d.decisions ?? 0));
  setT('rGoal', (d.goal || '—').slice(0, 60));
  setT('rFiles', String(d.files_modified ?? 0));
  setT('rProject', d.project_type || '—');
  setT('cogBadge', '认知: ' + (d.cognition ? 'ON' : 'OFF'));
  setT('execBadge', '执行: ' + (d.execution ? 'ON' : 'OFF'));
  setT('phaseBadge', phaseCN(d.phase));
  setT('sPhase', phaseCN(d.phase));

  // 状态栏 Token & 耗时
  if (d.decisions) totalTokens = Math.max(totalTokens, d.decisions * 200);
  setT('sTokens', (totalTokens / 1000).toFixed(1) + 'k');
  if (startTime > 0) {
    var sec = ((Date.now() - startTime) / 1000).toFixed(1);
    setT('sDuration', sec + 's');
  }

  // 决策列表
  var dl = document.getElementById('rDecList');
  if (d.recent_decisions && d.recent_decisions.length > 0) {
    dl.innerHTML = d.recent_decisions.slice(-5).reverse().map(function(dd) {
      return '<div class="d-item"><span class="ts">' + (dd.ts ? new Date(dd.ts * 1000).toLocaleTimeString() : '') + '</span>' + escHtml(dd.desc) + '</div>';
    }).join('');
  } else {
    dl.innerHTML = '<span style="font-size:11px;color:var(--text3);">(无)</span>';
  }
}
function phaseCN(p) { return {'intent_clarify':'意图澄清','analysis':'分析','planning':'规划','executing':'执行','verifying':'验证','done':'完成'}[p] || p || '—'; }

// ── 日志 ──
function log(level, msg) {

  const ts = new Date().toLocaleTimeString();
  d.textContent = '[' + ts + '] ' + msg;

// ── 文件树 (带重试) ──
let fileTreeData = {};

async function loadFileTree(retries) {
  if (retries === undefined) retries = 3;
  var container = document.getElementById('wsTree');
  if (!container) return;
  for (var attempt = 0; attempt <= retries; attempt++) {
    if (attempt > 0) container.innerHTML = '<div class="tree-item" style="color:var(--text3);font-size:11px;">重试 ' + attempt + '/' + retries + '...</div>';
    try {
      var r = await fetch('/api/files');
      var d = await r.json();
      if (d.error) throw new Error(d.error);
      if (d.tree && Object.keys(d.tree).length > 0) {
        renderFileTree(d.tree, 'wsTree');
      } else {
        container.innerHTML = '<div class="tree-item" style="color:var(--text3);font-size:11px;">' + (d.file_count || 0) + ' 个文件</div>';
      }
      return;
    } catch(err) {
      if (attempt < retries) {
        await new Promise(function(r) { setTimeout(r, 1000 * (attempt + 1)); });
      } else {
        container.innerHTML = '<div class="tree-item" style="color:var(--red);font-size:11px;">加载失败: ' + err.message + '</div>';
      }
    }
  }
}

function renderFileTree(tree, containerId, pathPrefix, containerEl) {
  var container = containerEl || document.getElementById(containerId);
  if (!container) return;
  pathPrefix = pathPrefix || '';
  container.innerHTML = '';
  const entries = Object.entries(tree).sort(function(a, b) {
    var aIsDir = a[1] !== null && typeof a[1] === 'object';
    var bIsDir = b[1] !== null && typeof b[1] === 'object';
    if (aIsDir && !bIsDir) return -1;
    if (!aIsDir && bIsDir) return 1;
    return a[0].localeCompare(b[0]);
  });
  for (var i = 0; i < entries.length; i++) {
    var name = entries[i][0];
    var children = entries[i][1];
    var isDir = children !== null && typeof children === 'object';
    var fullPath = pathPrefix ? pathPrefix + '/' + name : name;
    var div = document.createElement('div'); div.className = 'tree-item';

    if (isDir) {
      // 子节点数
      var childFiles = countFiles(children);
      div.innerHTML = '<div class="tree-item-inner">'
        + '<span class="tree-arrow">▶</span>'
        + '<span class="ic folder">📁</span>'
        + '<span class="tree-name">' + escHtml(name) + '</span>'
        + '<span class="tree-count">' + childFiles + '</span>'
        + '</div>';
      var subContainer = document.createElement('div');
      subContainer.className = 'tree-children';
      subContainer.style.display = 'none';
      var arrow = div.querySelector('.tree-arrow');
      div.addEventListener('click', function(ev) {
        ev.stopPropagation();
        var expanded = subContainer.style.display !== 'none';
        subContainer.style.display = expanded ? 'none' : 'block';
        if (arrow) arrow.className = 'tree-arrow' + (expanded ? '' : ' expanded');
        // 懒加载子节点
        if (!expanded && subContainer.children.length === 0) {
          renderFileTree(children, '', fullPath, subContainer);
        }
      });
      div.appendChild(subContainer);
    } else {
      // 文件
      var ext = name.split('.').pop().toLowerCase();
      var icon = getFileIcon(ext);
      div.innerHTML = '<div class="tree-item-inner" style="padding-left:14px;">'
        + '<span class="ic">' + icon + '</span>'
        + '<span class="tree-name">' + escHtml(name) + '</span>'
        + '</div>';
      div.addEventListener('click', function(fp) {
        return function(ev) {
          ev.stopPropagation();
          insertAtCursor('@file:' + fp);
        };
      }(fullPath));
    }
    container.appendChild(div);
  }
}

function countFiles(tree) {
  var count = 0;
  for (var k in tree) {
    if (tree[k] !== null && typeof tree[k] === 'object') {
      count += countFiles(tree[k]);
    } else {
      count++;
    }
  }
  return count;
}

function getFileIcon(ext) {
  var icons = {
    py: '🐍', js: '🟨', ts: '🔵', jsx: '⚛️', tsx: '⚛️',
    html: '🌐', css: '🎨', json: '📋', yaml: '📋', yml: '📋',
    md: '📝', txt: '📄', toml: '⚙️', cfg: '⚙️', ini: '⚙️',
    sh: '💻', bat: '💻', ps1: '💻',
    png: '🖼️', jpg: '🖼️', svg: '🖼️', ico: '🖼️',
    gitignore: '🙈', dockerfile: '🐳',
  };
  return icons[ext] || '📄';
}

// ── @file 插入 ──
function insertAtCursor(text) {
  var start = inp.selectionStart, end = inp.selectionEnd;
  var val = inp.value;
  inp.value = val.substring(0, start) + text + ' ' + val.substring(end);
  inp.selectionStart = inp.selectionEnd = start + text.length + 1;
  inp.focus();
  inp.dispatchEvent(new Event('input'));
}

async function loadLLMConfig() {
  try {
    var r = await fetch('/api/config'); var d = await r.json();
    var sel = document.getElementById('cfgModel');
    if (sel && d.model) { sel.value = d.model; }
    var slider = document.getElementById('cfgTemp');
    if (slider && d.temperature != null) { slider.value = d.temperature; }
    var valSpan = document.getElementById('cfgTempVal');
    if (valSpan && d.temperature != null) { valSpan.textContent = parseFloat(d.temperature).toFixed(1); }
    var mt = document.getElementById('cfgMaxTokens');
    if (mt && d.max_tokens) { mt.value = d.max_tokens; }
  } catch(_) {}
}

async function applyLLMConfig() {
  var body = {};
  var sel = document.getElementById('cfgModel');
  if (sel) { body.model = sel.value; }
  var slider = document.getElementById('cfgTemp');
  if (slider) { body.temperature = parseFloat(slider.value); }
  var mt = document.getElementById('cfgMaxTokens');
  if (mt) { body.max_tokens = parseInt(mt.value) || 8192; }
  var statusEl = document.getElementById('cfgStatus');
  if (statusEl) { statusEl.textContent = '更新中...'; statusEl.style.color = 'var(--text3)'; }
  try {
    var r = await fetch('/api/config/llm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    var d = await r.json();
    if (statusEl) {
      statusEl.textContent = '✓ 已应用 (' + (d.changed||[]).join(', ') + ')';
      statusEl.style.color = 'var(--green)';
      setTimeout(function() { statusEl.textContent = ''; }, 3000);
    }
  } catch(e) {
    if (statusEl) { statusEl.textContent = '✗ ' + e.message; statusEl.style.color = 'var(--red)'; }
  }
}

// ── 工作空间管理 ──

async function loadWorkspace() {
  try {
    var r = await fetch('/api/workspace');
    var d = await r.json();
    var pathEl = document.getElementById('wsPath');
    if (pathEl) pathEl.textContent = d.path;
    // 如果有 file_count 信息
  } catch(_) {}
}

function importWorkspace() {
  var path = prompt('输入已有目录的完整路径：\n(例如 D:/my-project)', '');
  if (!path || !path.trim()) return;
  path = path.trim().replace(/\\/g, '/');
  setWorkspace(path);
}

function createWorkspace() {
  var name = prompt('输入新项目名称：', 'my-project');
  if (!name || !name.trim()) return;
  name = name.trim().replace(/[^a-zA-Z0-9_-]/g, '_');
  fetch('/api/workspace/create', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name}),
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      log('i', '工作空间已创建: ' + d.path);
      refreshWorkspace(d.path);
    } else {
      log('e', '创建失败: ' + (d.error || ''));
    }
  }).catch(function(e) {
    log('e', '创建请求失败: ' + e);
  });
}

function setWorkspace(path) {
  fetch('/api/workspace/set', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path: path}),
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      log('i', '工作空间已切换: ' + d.path);
      refreshWorkspace(d.path);
    } else {
      log('e', '切换失败: ' + (d.error || ''));
    }
  }).catch(function(e) {
    log('e', '切换请求失败: ' + e);
  });
}

function refreshWorkspace(path) {
  var pathEl = document.getElementById('wsPath');
  if (pathEl) pathEl.textContent = path;
  // 重刷文件树
  loadFileTree(3);
}

// ── 工具组展开/折叠 ──
function toggleGroup(id) {
  var body = document.getElementById(id);
  if (!body) return;
  var expanded = body.style.display !== 'none';
  body.style.display = expanded ? 'none' : '';
  // Find the arrow in the header that controls this group
  var header = document.querySelector('[onclick*="' + id + '"] .arrow');
  if (header) header.classList.toggle('open');
}

// ── 加载内置工具网格 ──
async function loadToolList(retries) {
  if (retries === undefined) retries = 3;
  var container = document.getElementById('builtinGroup');
  if (!container) return;
  for (var attempt = 0; attempt <= retries; attempt++) {
    try {
      var r = await fetch('/api/tools');
      var t = await r.json();
      if (t.error) throw new Error(t.error);
      if (t.tools && t.tools.length > 0) {
        container.innerHTML = t.tools.map(function(tl) {
          var name = tl.name;
          var cls = (name === 'write' || name === 'edit' || name === 'bash') ? 'dot ok' : 'dot ok';
          return '<div class="tg-item"><span class="dot ' + cls + '"></span>' + escHtml(name) + '</div>';
        }).join('');
        var badge = document.getElementById('toolsCount');
        if (badge) badge.textContent = t.tools.length;
      } else {
        container.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:2px 4px;">无工具</div>';
      }
      return;
    } catch(err) {
      if (attempt < retries) {
        await new Promise(function(r) { setTimeout(r, 1000 * (attempt + 1)); });
      } else {
        container.innerHTML = '<div style="font-size:11px;color:var(--red);padding:2px 4px;">加载失败</div>';
      }
    }
  }
}

// ── 加载主机工具链网格 ──
async function loadHostTools() {
  var container = document.getElementById('hostToolGroup');
  if (!container) return;
  try {
    var r = await fetch('/api/env/tools');
    var d = await r.json();
    if (d.error) throw new Error(d.error);
    var badge = document.getElementById('hostToolsCount');
    if (badge) badge.textContent = d.total_available + ' / ' + Object.keys(d.tools).length;

    var tools = d.tools || {};
    var names = Object.keys(tools).sort();
    var html = '';
    for (var i = 0; i < names.length; i++) {
      var t = tools[names[i]];
      var cls = t.available ? 'tg-item env-ok' : 'tg-item env-miss';
      var dot = t.available ? 'dot ok' : 'dot disabled';
      var label = t.available ? (t.name + ' <span class="tg-ver">' + (t.version || '').slice(0, 20) + '</span>') : t.name;
      html += '<div class="' + cls + '"><span class="' + dot + '"></span>' + label + '</div>';
    }
    container.innerHTML = html || '<div style="font-size:11px;color:var(--text3);padding:2px 4px;">未探测到工具</div>';
  } catch(err) {
    container.innerHTML = '<div style="font-size:11px;color:var(--red);padding:2px 4px;">探测失败</div>';
  }
}
